<svg
  width="560"
  height="140"
  viewBox="0 0 560 140"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="logo-title logo-description"
>
  <title id="logo-title">KoreValet</title>
  <desc id="logo-description">
    KoreValet logo with a modern slate blue and silver geometric K
  </desc>

  <!-- Logo mark -->
  <g transform="translate(8 10)">
    <!-- Green vertical stem -->
    <path
      d="M12 12V108"
      stroke="#155B4C"
      stroke-width="15"
      stroke-linecap="square"
    />

    <!-- Green upper arm -->
    <path
      d="M27 61L82 12"
      stroke="#155B4C"
      stroke-width="15"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />

    <!-- Orange lower arm -->
    <path
      d="M27 61L84 108"
      stroke="#E8844A"
      stroke-width="15"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />

    <!-- Small green terminal detail -->
    <path
      d="M75 12H91"
      stroke="#155B4C"
      stroke-width="15"
      stroke-linecap="square"
    />

    <!-- Small orange terminal detail -->
    <path
      d="M77 108H93"
      stroke="#E8844A"
      stroke-width="15"
      stroke-linecap="square"
    />
  </g>

  <!-- Wordmark -->
  <text
    x="128"
    y="76"
    fill="#173B35"
    font-family="Trebuchet MS, Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
  >
    KoreValet
  </text>

  <!-- Descriptor -->
  <text
    x="132"
    y="105"
    fill="#6A7973"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    font-weight="700"
    letter-spacing="2.4"
  >
    VALET TRASH &amp; RECYCLING
  </text>
</svg>
