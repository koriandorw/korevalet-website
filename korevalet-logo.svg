<svg
  width="520"
  height="112"
  viewBox="0 0 520 112"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">KoreValet logo</title>
  <desc id="description">
    Green and orange geometric K logo with KoreValet wordmark
  </desc>

  <!-- Custom K symbol -->
  <g transform="translate(8 8)">
    <!-- Main vertical stroke -->
    <path
      d="M8 8V96"
      stroke="#155B4C"
      stroke-width="12"
      stroke-linecap="square"
    />

    <!-- Upper diagonal stroke -->
    <path
      d="M20 52L70 8"
      stroke="#155B4C"
      stroke-width="12"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />

    <!-- Lower orange diagonal stroke -->
    <path
      d="M20 52L70 96"
      stroke="#E8844A"
      stroke-width="12"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />

    <!-- Small green top extension -->
    <path
      d="M63 8H82"
      stroke="#155B4C"
      stroke-width="12"
      stroke-linecap="square"
    />

    <!-- Small orange bottom extension -->
    <path
      d="M63 96H82"
      stroke="#E8844A"
      stroke-width="12"
      stroke-linecap="square"
    />
  </g>

  <!-- KoreValet wordmark -->
  <text
    x="112"
    y="68"
    fill="#173B35"
    font-family="Arial, Helvetica, sans-serif"
    font-size="43"
    font-weight="700"
    letter-spacing="-1.8"
  >
    KoreValet
  </text>
</svg>
