<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | KoreValet</title>

  <style>
    :root {
      --forest: #123b31;
      --orange: #e8844a;
      --cream: #f5f2eb;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      align-items: center;
      background: var(--cream);
      color: var(--forest);
      display: flex;
      font-family: Arial, sans-serif;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .message {
      background: var(--white);
      border-top: 6px solid var(--orange);
      max-width: 560px;
      padding: 52px 32px;
      width: 100%;
    }

    h1 {
      margin-bottom: 16px;
    }

    p {
      line-height: 1.6;
      margin-bottom: 28px;
    }

    a {
      background: var(--forest);
      color: var(--white);
      display: inline-block;
      padding: 14px 22px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main class="message">
    <h1>Thank you for contacting KoreValet.</h1>

    <p>
      Your inquiry has been received. Our team will follow up shortly.
    </p>

    <a href="index.html">Return to KoreValet</a>
  </main>
</body>
</html>
