<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KoreValet provides apartment valet trash, recycling, and dog waste station services throughout the DFW area.">
  <title>KoreValet | Apartment Community Services</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #304a6a;
      --navy-dark: #243a55;
      --steel: #9bafc1;
      --cream: #f3eee4;
      --paper: #fcfaf6;
      --brown: #806451;
      --brown-light: #b49a7d;
      --ink: #26384f;
      --muted: #687686;
      --line: #d9d2c9;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(48, 74, 106, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: "DM Sans", Arial, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    img,
    video {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .container {
      margin: 0 auto;
      width: min(1160px, calc(100% - 40px));
    }

    .eyebrow {
      align-items: center;
      color: var(--brown);
      display: flex;
      font-size: 0.72rem;
      font-weight: 800;
      gap: 10px;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      background: var(--brown-light);
      content: "";
      height: 2px;
      width: 28px;
    }

    .section-title {
      color: var(--navy-dark);
      font-family: "Manrope", Arial, sans-serif;
      font-size: clamp(2.25rem, 5vw, 4.3rem);
      letter-spacing: -0.06em;
      line-height: 1;
      max-width: 710px;
    }

    .section-copy {
      color: var(--muted);
      font-size: 1rem;
      max-width: 580px;
    }

    .button {
      align-items: center;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      font-size: 0.88rem;
      font-weight: 800;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      transition: 180ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button-primary {
      background: var(--brown);
      color: var(--white);
    }

    .button-primary:hover {
      background: #684d3d;
    }

    .button-light {
      border-color: rgba(255, 255, 255, 0.55);
      color: var(--white);
    }

    .button-light:hover {
      background: var(--white);
      color: var(--navy-dark);
    }

    .button-navy {
      background: var(--navy);
      color: var(--white);
    }

    .button-navy:hover {
      background: var(--navy-dark);
    }

    /* Navigation */

    .site-header {
      background: rgba(252, 250, 246, 0.96);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
    }

    .navigation {
      align-items: center;
      display: flex;
      height: 78px;
      justify-content: space-between;
      position: relative;
    }

    .brand {
      align-items: center;
      display: inline-flex;
      gap: 12px;
    }

    .logo-mark {
      height: 43px;
      width: 82px;
    }

    .brand-name {
      color: var(--navy-dark);
      display: block;
      font-family: "Manrope", Arial, sans-serif;
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .brand-subtitle {
      color: var(--brown);
      display: block;
      font-size: 0.53rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      margin-top: 5px;
    }

    .nav-links {
      align-items: center;
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .nav-links a:hover {
      color: var(--brown);
    }

    .nav-links .nav-cta {
      color: var(--white);
      min-height: 42px;
      padding: 0 16px;
    }

    .menu-button {
      background: transparent;
      border: 0;
      cursor: pointer;
      display: none;
      padding: 8px;
    }

    .menu-button span {
      background: var(--navy-dark);
      display: block;
      height: 2px;
      margin: 5px 0;
      width: 25px;
    }

    /* Hero */

    .hero {
      background:
        linear-gradient(105deg, rgba(36, 58, 85, 0.98), rgba(48, 74, 106, 0.72)),
        url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=1800&q=85")
        center / cover no-repeat;
      color: var(--white);
      padding: 105px 0;
    }

    .hero-grid {
      align-items: center;
      display: grid;
      gap: 75px;
      grid-template-columns: 0.95fr 1.05fr;
    }

    .hero h1 {
      font-family: "Manrope", Arial, sans-serif;
      font-size: clamp(3rem, 6vw, 5.6rem);
      letter-spacing: -0.07em;
      line-height: 0.96;
      margin: 22px 0;
      max-width: 680px;
    }

    .hero-copy {
      color: #e4ebf0;
      font-size: 1.08rem;
      max-width: 500px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }
