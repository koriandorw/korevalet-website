<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KoreValet provides reliable valet trash and community waste services for apartment communities across DFW." />
  <title>KoreValet | Valet Trash for Apartment Communities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #f5f1ea;
      --bg-alt: #ebe3d6;
      --card: rgba(255,255,255,.78);
      --card-strong: #ffffff;
      --text: #23313f;
      --muted: #607080;
      --navy: #16344a;
      --slate: #2f5875;
      --steel: #6f8496;
      --line: rgba(35,49,63,.12);
      --shadow: 0 18px 45px rgba(22,52,74,.12);
      --shadow-soft: 0 12px 30px rgba(22,52,74,.08);
      --accent: #8d7358;
      --accent-2: #c5ae91;
      --accent-3: #d7e3ea;
      --success: #2f7b5a;
      --max: 1180px;
      --radius: 24px;
      --radius-sm: 16px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(215,227,234,.9), transparent 36%),
        radial-gradient(circle at top right, rgba(197,174,145,.18), transparent 28%),
        linear-gradient(180deg, #fbf8f4 0%, var(--bg) 50%, #f7f4ef 100%);
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border: 1px solid rgba(22,52,74,.12);
      border-radius: 999px;
      background: rgba(255,255,255,.65);
      color: var(--slate);
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
      box-shadow: 0 8px 24px rgba(22,52,74,.06);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(141,115,88,.12);
    }

    .section {
      padding: 88px 0;
    }

    .section-tight {
      padding: 68px 0;
    }

    .section-head {
      display: grid;
      gap: 14px;
      margin-bottom: 28px;
      max-width: 760px;
    }

    .section-head h2,
    .hero h1,
    .card h3,
    .mini-card h3,
    .panel h3,
    .metric h3 {
      font-family: 'Manrope', sans-serif;
      letter-spacing: -0.03em;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.9rem, 2.7vw, 3rem);
      line-height: 1.05;
      color: var(--navy);
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.7;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(245,241,234,.76);
      border-bottom: 1px solid rgba(22,52,74,.09);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 82px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--navy);
      min-width: fit-content;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 1.12rem;
      background:
        linear-gradient(145deg, #1d4764, #0f2636);
      box-shadow: 0 14px 24px rgba(22,52,74,.22);
      border: 1px solid rgba(255,255,255,.2);
    }

    .brand span {
      display: grid;
      gap: 2px;
    }

    .brand small {
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--navy);
      font-weight: 700;
      font-size: .96rem;
      opacity: .84;
      transition: opacity .2s ease, transform .2s ease, color .2s ease;
    }

    .nav-links a:hover {
      opacity: 1;
      transform: translateY(-1px);
      color: var(--slate);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn,
    .btn-outline,
    .btn-dark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 800;
      border: 1px solid transparent;
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease, color .22s ease, border-color .22s ease;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    .btn {
      background: linear-gradient(145deg, var(--navy), var(--slate));
      color: #fff;
      box-shadow: 0 16px 28px rgba(22,52,74,.18);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 34px rgba(22,52,74,.22);
    }

    .btn-outline {
      background: rgba(255,255,255,.78);
      color: var(--navy);
      border-color: rgba(22,52,74,.14);
    }

    .btn-outline:hover {
      transform: translateY(-2px);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .btn-dark {
      background: var(--navy);
      color: #fff;
    }

    .menu-toggle {
      display: none;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(22,52,74,.14);
      background: rgba(255,255,255,.82);
      border-radius: 14px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(22,52,74,.06);
    }

    .menu-toggle span,
    .menu-toggle span::before,
    .menu-toggle span::after {
      content: "";
      display: block;
      width: 20px;
      height: 2px;
      border-radius: 2px;
      background: var(--navy);
      position: relative;
    }

    .menu-toggle span::before {
      position: absolute;
      top: -6px;
      left: 0;
    }

    .menu-toggle span::after {
      position: absolute;
      top: 6px;
      left: 0;
    }

    .hero {
      position: relative;
      padding: 34px 0 26px;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 28px;
      align-items: center;
      min-height: 760px;
    }

    .hero-copy {
      padding: 32px 0;
    }

    .hero h1 {
      margin: 18px 0 16px;
      font-size: clamp(3rem, 6vw, 5.6rem);
      line-height: .95;
      color: var(--navy);
      max-width: 10ch;
    }

    .hero p {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(22,52,74,.09);
      color: var(--navy);
      font-size: .92rem;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(22,52,74,.06);
    }

    .chip::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    .hero-visual {
      position: relative;
    }

    .hero-card {
      position: relative;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(22,52,74,.18);
      border: 1px solid rgba(255,255,255,.8);
      background: #dfe8ee;
      min-height: 640px;
      isolation: isolate;
    }

    .hero-card img {
      width: 100%;
      height: 100%;
      min-height: 640px;
      object-fit: cover;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8,18,26,.08) 0%, rgba(8,18,26,.42) 100%);
      z-index: 1;
    }

    .hero-badge {
      position: absolute;
      left: 22px;
      bottom: 22px;
      z-index: 2;
      display: grid;
      gap: 6px;
      max-width: 300px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      color: #fff;
      background: rgba(13,28,39,.64);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
    }

    .hero-badge strong {
      font-family: 'Manrope', sans-serif;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .hero-badge span {
      font-size: .94rem;
      line-height: 1.55;
      color: rgba(255,255,255,.86);
    }

    .stats {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .stat {
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(22,52,74,.08);
      box-shadow: 0 12px 28px rgba(22,52,74,.06);
    }

    .stat strong {
      display: block;
      font-family: 'Manrope', sans-serif;
      font-size: 1.55rem;
      color: var(--navy);
      letter-spacing: -0.03em;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.45;
    }

    .surface {
      position: relative;
      z-index: 1;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card,
    .mini-card,
    .panel,
    .quote,
    .contact-card,
    .roi-card {
      background: var(--card);
      border: 1px solid rgba(22,52,74,.09);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .card {
      overflow: hidden;
    }

    .card-media {
      position: relative;
      height: 220px;
      overflow: hidden;
      background: #d8e3eb;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .55s ease;
    }

    .card:hover .card-media img {
      transform: scale(1.04);
    }

    .card-body {
      padding: 20px 20px 22px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.22rem;
      color: var(--navy);
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .card-list {
      margin: 16px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .card-list li {
      display: flex;
      gap: 10px;
      color: var(--text);
      line-height: 1.6;
    }

    .card-list li::before {
      content: "•";
      color: var(--accent);
      font-weight: 900;
    }

    .service-highlight {
      margin-top: 18px;
      padding: 22px;
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(22,52,74,.96), rgba(47,88,117,.92));
      color: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      box-shadow: 0 20px 34px rgba(22,52,74,.18);
    }

    .service-highlight h3 {
      margin: 0 0 8px;
      font-family: 'Manrope', sans-serif;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .service-highlight p {
      margin: 0;
      color: rgba(255,255,255,.84);
      line-height: 1.65;
    }

    .service-highlight .btn-outline {
      background: rgba(255,255,255,.12);
      color: #fff;
      border-color: rgba(255,255,255,.2);
    }

    .service-highlight .btn-outline:hover {
      background: rgba(255,255,255,.18);
      box-shadow: none;
    }

    .process {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
      align-items: start;
    }

    .steps {
      display: grid;
      gap: 14px;
    }

    .step {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 16px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(22,52,74,.09);
      box-shadow: 0 12px 26px rgba(22,52,74,.05);
    }

    .step-number {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-family: 'Manrope', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(145deg, var(--navy), var(--slate));
      box-shadow: 0 14px 24px rgba(22,52,74,.16);
    }

    .step h3 {
      margin: 2px 0 8px;
      font-size: 1.08rem;
      color: var(--navy);
    }

    .step p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .mini-card {
      padding: 22px;
    }

    .mini-card h3 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 1.24rem;
    }

    .mini-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .mini-features {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      padding: 0;
      list-style: none;
    }

    .mini-features li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      line-height: 1.55;
      color: var(--text);
    }

    .mini-features li::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
      margin-top: .45em;
      box-shadow: 0 0 0 5px rgba(141,115,88,.12);
    }

    .service-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .area-panel,
    .quote,
    .contact-card,
    .roi-card {
      padding: 24px;
    }

    .area-panel h3,
    .quote h3,
    .contact-card h3,
    .roi-card h3 {
      margin: 0 0 10px;
      font-size: 1.28rem;
      color: var(--navy);
    }

    .area-panel p,
    .quote p,
    .contact-card p,
    .roi-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
    }

    .area-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .tag {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(22,52,74,.1);
      background: rgba(255,255,255,.66);
      color: var(--navy);
      font-size: .92rem;
      font-weight: 700;
    }

    .quote {
      display: grid;
      align-content: start;
      gap: 16px;
      background:
        linear-gradient(145deg, rgba(22,52,74,.96), rgba(47,88,117,.9));
      color: #fff;
    }

    .quote p,
    .quote h3 {
      color: #fff;
    }

    .quote .btn-outline {
      background: rgba(255,255,255,.12);
      color: #fff;
      border-color: rgba(255,255,255,.18);
      justify-self: start;
    }

    .quote .btn-outline:hover {
      background: rgba(255,255,255,.18);
      box-shadow: none;
    }

    .roi-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 18px;
      align-items: start;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-weight: 700;
      color: var(--navy);
      font-size: .95rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(22,52,74,.14);
      background: rgba(255,255,255,.92);
      min-height: 50px;
      padding: 12px 14px;
      font: inherit;
      color: var(--text);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }

    .field textarea {
      min-height: 130px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(47,88,117,.55);
      box-shadow: 0 0 0 4px rgba(47,88,117,.10);
    }

    .range-wrap {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,.6);
      border: 1px solid rgba(22,52,74,.08);
    }

    .range-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .range-row strong {
      color: var(--navy);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--slate);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .metric {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.7);
      border: 1px solid rgba(22,52,74,.08);
    }

    .metric span {
      display: block;
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric strong {
      font-family: 'Manrope', sans-serif;
      font-size: 1.5rem;
      color: var(--navy);
      letter-spacing: -0.03em;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr .95fr;
      gap: 18px;
      align-items: start;
    }

    .contact-card form {
      margin-top: 16px;
